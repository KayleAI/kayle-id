name: kayle-id
icon: apps/platform/public/android-chrome-512x512.png
processes:
  Platform:
    command: bun run dev
    working_dir: ./apps/platform
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  Database:
    command: ./infra/postgres/launch.sh
    working_dir: null
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  API:
    command: bun run dev
    working_dir: ./apps/api
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  Verify:
    command: bun run dev
    working_dir: ./apps/verify
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
