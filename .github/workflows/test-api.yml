name: Test Kayle ID API
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    container: node:24-slim
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kayle-id
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NODE_ENV: test
      # A randomly generated secret for testing
      AUTH_SECRET: YrI9mdtghMK4xwI9n9W7npc9rcujcB6X

    services:
      postgres:
        image: postgres:17.7

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kayle-id

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Install unzip and curl
        run: |
          apt-get update
          apt-get install -y unzip curl
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: Export DATABASE_URL
        run: |
          echo "DATABASE_URL=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Migrate + seed database
        run: bun run db:setup
      - name: Start API, wait, run tests, and stop
        run: |
          set -e

          cd apps/api

          bun run dev:test > /tmp/api.log 2>&1 &
          SERVER_PID=$!
          echo "API server started with PID $SERVER_PID"

          for i in $(seq 1 60); do
            echo "Attempt $i/60: checking readiness..."

            if grep -q "Ready on http://localhost:8787" /tmp/api.log; then
              echo "Found 'Ready on http://localhost:8787' in logs"
              break
            fi

            HTTP_CODE=$(
              curl \
                --connect-timeout 1 \
                --max-time 2 \
                -s -o /dev/null -w "%{http_code}" \
                http://localhost:8787/ 2>/dev/null || echo "000"
            )

            if [ "$HTTP_CODE" = "200" ]; then
              echo "API server is ready! (HTTP $HTTP_CODE)"
              break
            fi

            echo "Not ready yet (HTTP $HTTP_CODE). Sleeping 1s..."
            sleep 1
          done

          echo "Hit / once to confirm:"
          curl --connect-timeout 1 --max-time 2 -s http://localhost:8787/ | head -5 || true

          bun test

          echo "Stopping API server with PID $SERVER_PID"
          kill $SERVER_PID || true
          wait $SERVER_PID 2>/dev/null || true
          echo "API server stopped"