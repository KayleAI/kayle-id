name: Test Kayle ID API
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    container: node:24-slim
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kayle-id
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NODE_ENV: test
      # A randomly generated secret for testing
      AUTH_SECRET: YrI9mdtghMK4xwI9n9W7npc9rcujcB6X

    services:
      postgres:
        image: postgres:17.7

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kayle-id

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Install unzip and curl
        run: |
          apt-get update
          apt-get install -y unzip curl
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: Export DATABASE_URL
        run: |
          echo "DATABASE_URL=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Migrate + seed database
        run: bun run db:setup
      - name: Start API
        run: |
          cd apps/api
          bun run dev:test > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          echo "API server started with PID $(cat /tmp/api.pid)"
      - name: Wait for API to be ready
        run: |
          echo "Waiting for API server to be ready..."
          echo "Giving server 5 seconds to initialize..."
          sleep 5
          echo "Checking if process is running..."
          if [ -f /tmp/api.pid ]; then
            PID=$(cat /tmp/api.pid)
            if ps -p $PID > /dev/null 2>&1; then
              echo "Process $PID is running"
            else
              echo "Process $PID not found - server may have crashed"
              cat /tmp/api.log || true
              exit 1
            fi
          fi
          echo "Checking API logs for ready message..."
          tail -30 /tmp/api.log || true
          for i in $(seq 1 30); do
            echo "Attempt $i/30: Checking http://localhost:8787/..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8787/ 2>&1 || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "API server is ready! (HTTP $HTTP_CODE)"
              curl -s http://localhost:8787/ | head -5 || true
              exit 0
            elif [ "$HTTP_CODE" = "000" ]; then
              echo "Connection failed (curl error), server may not be ready yet"
              curl -v http://localhost:8787/ 2>&1 | head -10 || true
            else
              echo "Got HTTP $HTTP_CODE, server responding but may not be ready"
            fi
            echo "Waiting 2 seconds before next attempt..."
            sleep 2
          done
          echo "API server failed to start within 60 seconds"
          echo "Checking what's listening on port 8787:"
          netstat -tlnp 2>/dev/null | grep 8787 || ss -tlnp 2>/dev/null | grep 8787 || echo "Could not check port 8787"
          echo "Full API logs:"
          cat /tmp/api.log || true
          exit 1
      - name: Run tests
        run: cd apps/api && bun test
      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            PID=$(cat /tmp/api.pid)
            echo "Stopping API server with PID $PID"
            kill $PID || true
            wait $PID 2>/dev/null || true
            echo "API server stopped"
          fi
