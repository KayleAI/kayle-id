name: Test Kayle ID API
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    container: node:24-slim
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kayle-id
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NODE_ENV: test
      # A randomly generated secret for testing
      AUTH_SECRET: YrI9mdtghMK4xwI9n9W7npc9rcujcB6X

    services:
      postgres:
        image: postgres:17.7

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kayle-id

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Install unzip
        run: |
          apt-get update
          apt-get install -y unzip
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: Export DATABASE_URL
        run: |
          echo "DATABASE_URL=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Migrate + seed database
        run: bun run db:setup
      - name: Run tests
        run: cd apps/api && bun test