name: Test Kayle ID API
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    container: node:24-slim
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kayle-id
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NODE_ENV: test
      # A randomly generated secret for testing
      AUTH_SECRET: YrI9mdtghMK4xwI9n9W7npc9rcujcB6X

    services:
      postgres:
        image: postgres:17.7

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kayle-id

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Install unzip and curl
        run: |
          apt-get update
          apt-get install -y unzip curl
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: Export DATABASE_URL
        run: |
          echo "DATABASE_URL=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Migrate + seed database
        run: bun run db:setup
      - name: Start API
        run: |
          cd apps/api
          bun run dev > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          echo "API server started with PID $(cat /tmp/api.pid)"
      - name: Wait for API to be ready
        run: |
          echo "Waiting for API server to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:8787/ > /dev/null 2>&1; then
              echo "API server is ready!"
              exit 0
            fi
            echo "Attempt $i/30: API server not ready yet, waiting..."
            sleep 2
          done
          echo "API server failed to start within 60 seconds"
          cat /tmp/api.log || true
          exit 1
      - name: Run tests
        run: cd apps/api && bun test
      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            PID=$(cat /tmp/api.pid)
            echo "Stopping API server with PID $PID"
            kill $PID || true
            wait $PID 2>/dev/null || true
            echo "API server stopped"
          fi
