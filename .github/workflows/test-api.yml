name: Test Kayle ID API
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    container: node:24-slim
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kayle-id
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NODE_ENV: test
      # A randomly generated secret for testing
      AUTH_SECRET: YrI9mdtghMK4xwI9n9W7npc9rcujcB6X

    services:
      postgres:
        image: postgres:17.7

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kayle-id

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Install unzip and curl
        run: |
          apt-get update
          apt-get install -y unzip curl
      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: Export DATABASE_URL
        run: |
          echo "DATABASE_URL=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Migrate + seed database
        run: bun run db:setup

      # Start the API dev server and tests in the same step so they can run concurrently.
      # The server is started in the background, we wait a bit, run tests, then always stop it.
      - name: Start API, run tests, and stop
        run: |
          set -u

          cd apps/api

          # Start Wrangler dev (test env) in the background
          bun run test:setup
          bun run test:dev > /tmp/api.log 2>&1 &
          SERVER_PID=$!
          echo "API server started with PID $SERVER_PID"

          # Give the server a moment to boot
          sleep 8

          # Run tests against the running server
          bun test
          TEST_EXIT=$?

          echo "Stopping API server with PID $SERVER_PID"
          kill $SERVER_PID || true
          wait $SERVER_PID 2>/dev/null || true
          echo "API server stopped"

          exit $TEST_EXIT