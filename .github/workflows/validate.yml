name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          apt-packages: ripgrep

      - name: Run repository validation
        run: bun run lint
