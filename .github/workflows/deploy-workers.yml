name: Deploy Workers

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-workers-production
  cancel-in-progress: false

env:
  CI: "true"
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  detect_changes:
    name: Detect Deploy Changes
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    outputs:
      face_matcher: ${{ steps.filter.outputs.face_matcher }}
      api: ${{ steps.filter.outputs.api }}
      platform: ${{ steps.filter.outputs.platform }}
      verify: ${{ steps.filter.outputs.verify }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Detect worker changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            {
              echo "face_matcher=true"
              echo "api=true"
              echo "platform=true"
              echo "verify=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse HEAD^1 >/dev/null 2>&1; then
            {
              echo "face_matcher=true"
              echo "api=true"
              echo "platform=true"
              echo "verify=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_ref="$(git rev-parse HEAD^1)"

          has_changes() {
            if git diff --quiet "${base_ref}" HEAD -- "$@"; then
              echo "false"
            else
              echo "true"
            fi
          }

          {
            echo "face_matcher=$(has_changes \
              bun.lock \
              package.json \
              infra/face-matcher \
              packages/config)"
            echo "api=$(has_changes \
              bun.lock \
              package.json \
              apps/api \
              packages/auth \
              packages/capnp \
              packages/config \
              packages/database)"
            echo "platform=$(has_changes \
              bun.lock \
              package.json \
              apps/platform \
              packages/auth \
              packages/config)"
            echo "verify=$(has_changes \
              bun.lock \
              package.json \
              apps/verify \
              packages/capnp \
              packages/config)"
          } >> "$GITHUB_OUTPUT"

  deploy_face_matcher:
    name: Deploy Face Matcher
    runs-on: ubuntu-latest
    needs: detect_changes
    if: >-
      needs.detect_changes.outputs.face_matcher == 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Deploy face matcher worker
        working-directory: infra/face-matcher
        run: bun run deploy

  deploy_api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - deploy_face_matcher
    if: >-
      needs.detect_changes.outputs.api == 'true' &&
      (
        needs.deploy_face_matcher.result == 'success' ||
        needs.deploy_face_matcher.result == 'skipped'
      )

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Deploy API worker
        working-directory: apps/api
        run: bun run deploy

  deploy_platform:
    name: Deploy Platform
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - deploy_api
    if: >-
      needs.detect_changes.outputs.platform == 'true' &&
      (
        needs.deploy_api.result == 'success' ||
        needs.deploy_api.result == 'skipped'
      )

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Build platform worker
        working-directory: apps/platform
        run: bun run build

      - name: Deploy platform worker
        working-directory: apps/platform
        run: bun run deploy

  deploy_verify:
    name: Deploy Verify
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - deploy_api
    if: >-
      needs.detect_changes.outputs.verify == 'true' &&
      (
        needs.deploy_api.result == 'success' ||
        needs.deploy_api.result == 'skipped'
      )

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Build verify worker
        working-directory: apps/verify
        run: bun run build

      - name: Deploy verify worker
        working-directory: apps/verify
        run: bun run deploy
