name: Deploy Workers

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-workers-production
  cancel-in-progress: false

env:
  CI: "true"
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-face-matcher:
    name: Deploy Face Matcher
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Deploy face matcher worker
        working-directory: infra/face-matcher
        run: bun run deploy

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: deploy-face-matcher

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Deploy API worker
        working-directory: apps/api
        run: bun run deploy

  deploy-platform:
    name: Deploy Platform
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Deploy platform worker
        working-directory: apps/platform
        run: bun run deploy

  deploy-verify:
    name: Deploy Verify
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Deploy verify worker
        working-directory: apps/verify
        run: bun run deploy
