name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          apt-packages: ripgrep

      - name: Run repository validation
        run: bun run lint

  test-api:
    name: Test API Integration
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kayle-id
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 6432
      NODE_ENV: test
      AUTH_SECRET: YrI9mdtghMK4xwI9n9W7npc9rcujcB6X

    services:
      postgres:
        image: postgres:17.7
        ports:
          - 6432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kayle-id
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          apt-packages: unzip curl ripgrep
          generate-capnp-ts: "true"

      - name: Export DATABASE_URL
        run: |
          echo "DATABASE_URL=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" >> "$GITHUB_ENV"

      - name: Migrate + seed database
        run: bun run db:setup

      - name: Start API, run tests, and stop
        run: |
          set -u

          cd infra/face-matcher
          bun run test:dev > /tmp/face-matcher.log 2>&1 &
          MATCHER_PID=$!
          echo "Face matcher started with PID $MATCHER_PID"

          sleep 10

          cd ../../apps/api

          bun run test:setup
          bun run test:dev > /tmp/api.log 2>&1 &
          SERVER_PID=$!
          echo "API server started with PID $SERVER_PID"

          sleep 10

          bun test

          echo "Stopping face matcher with PID $MATCHER_PID"
          kill $MATCHER_PID || true
          wait $MATCHER_PID 2>/dev/null || true
          echo "Face matcher stopped"

          echo "Stopping API server with PID $SERVER_PID"
          kill $SERVER_PID || true
          wait $SERVER_PID 2>/dev/null || true
          echo "API server stopped"

  test-web:
    name: Test Web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Test face matcher
        run: bun --cwd infra/face-matcher test

      - name: Test platform
        run: bun --cwd apps/platform test

      - name: Test verify
        run: bun --cwd apps/verify test
