name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          apt-packages: ripgrep

      - name: Run repository validation
        run: bun run lint

  test-api:
    name: Test API Integration
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kayle-id
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 6432
      NODE_ENV: test
      AUTH_SECRET: YrI9mdtghMK4xwI9n9W7npc9rcujcB6X

    services:
      postgres:
        image: postgres:17.7
        ports:
          - 6432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kayle-id
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          apt-packages: unzip curl ripgrep
          generate-capnp-ts: "true"

      - name: Export DATABASE_URL
        run: |
          echo "DATABASE_URL=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" >> "$GITHUB_ENV"

      - name: Migrate + seed database
        run: bun run db:setup

      - name: Start API, run tests, and stop
        run: |
          set -euo pipefail

          cleanup() {
            local exit_code="$1"
            trap - EXIT
            set +e

            if [[ "${exit_code}" -ne 0 ]]; then
              echo "Face matcher log:"
              cat /tmp/face-matcher.log || true
              echo "API log:"
              cat /tmp/api.log || true
            fi

            if [[ -n "${SERVER_PID:-}" ]]; then
              echo "Stopping API server with PID ${SERVER_PID}"
              kill "${SERVER_PID}" 2>/dev/null || true
              wait "${SERVER_PID}" 2>/dev/null || true
            fi

            if [[ -n "${MATCHER_PID:-}" ]]; then
              echo "Stopping face matcher with PID ${MATCHER_PID}"
              kill "${MATCHER_PID}" 2>/dev/null || true
              wait "${MATCHER_PID}" 2>/dev/null || true
            fi

            exit "${exit_code}"
          }

          wait_for_matcher() {
            local start_time
            start_time="$(date +%s)"

            while true; do
              if ! kill -0 "${MATCHER_PID}" 2>/dev/null; then
                echo "Face matcher exited before becoming healthy."
                return 1
              fi

              if response="$(curl -fsS http://127.0.0.1:8788/health 2>/dev/null)" && \
                python3 -c 'import json,sys; payload=json.loads(sys.stdin.read()); raise SystemExit(0 if payload.get("data", {}).get("ready") is True else 1)' <<<"${response}"; then
                return 0
              fi

              if [[ "$(($(date +%s) - start_time))" -ge 30 ]]; then
                echo "Face matcher did not become healthy within 30 seconds."
                return 1
              fi

              sleep 1
            done
          }

          wait_for_api() {
            local start_time
            start_time="$(date +%s)"

            while true; do
              if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
                echo "API server exited before becoming ready."
                return 1
              fi

              if curl -fsS http://127.0.0.1:8787/ >/dev/null 2>&1; then
                return 0
              fi

              if [[ "$(($(date +%s) - start_time))" -ge 30 ]]; then
                echo "API server did not become ready within 30 seconds."
                return 1
              fi

              sleep 1
            done
          }

          trap 'cleanup $?' EXIT

          bun --cwd infra/face-matcher run test:dev > /tmp/face-matcher.log 2>&1 &
          MATCHER_PID=$!
          echo "Face matcher started with PID ${MATCHER_PID}"
          wait_for_matcher

          bun --cwd apps/api run test:setup
          bun --cwd apps/api run test:dev > /tmp/api.log 2>&1 &
          SERVER_PID=$!
          echo "API server started with PID ${SERVER_PID}"
          wait_for_api

          bun --cwd apps/api test

  test-web:
    name: Test Web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Test face matcher
        run: bun --cwd infra/face-matcher test

      - name: Test platform
        run: bun --cwd apps/platform test

      - name: Test verify
        run: bun --cwd apps/verify test
